backend:
  name: git-gateway
  repo: austriaalvinnoel/pgrade-buddy
  branch: main
  auth_endpoint: https://api.netlify.com

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "pages"
    label: "Pages"
    files:
      - label: "Homepage"
        name: "homepage"
        file: "index.html"
        fields:
          - { label: "Title", name: "title", widget: "string" }
