<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Real Johnny Watson</title>
    <link rel="icon" href="/favicon.png" type="image/png">
    <meta name="description" content="The Real Johnny Watson - Comedian, Entertainer, Legend" />
    <meta name="author" content="Johnny Watson" />
    <meta property="og:title" content="The Real Johnny Watson" />
    <meta property="og:description" content="The Real Johnny Watson - Comedian, Entertainer, Legend" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://therealjohnnywatson.com/images/johnny-watson.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@therealjohnnywatson" />
    <meta name="twitter:image" content="https://therealjohnnywatson.com/images/johnny-watson.jpg" />
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Person",
          "@id": "https://therealjohnnywatson.com/#johnny",
          "name": "Johnny Watson",
          "url": "https://therealjohnnywatson.com",
          "image": "https://therealjohnnywatson.com/images/johnny-watson.jpg",
          "description": "Johnny Watson is a comedian, actor, and entertainer bringing laughter to audiences across the nation.",
          "jobTitle": "Comedian",
          "knowsAbout": ["Stand-up Comedy", "Acting", "Entertainment"],
          "sameAs": [
            "https://www.instagram.com/therealjohnnywatson",
            "https://www.facebook.com/therealjohnnywatson",
            "https://twitter.com/therealjohnnywatson"
          ]
        },
        {
          "@type": "WebSite",
          "@id": "https://therealjohnnywatson.com/#website",
          "url": "https://therealjohnnywatson.com",
          "name": "The Real Johnny Watson",
          "description": "Official website of comedian Johnny Watson",
          "publisher": {
            "@id": "https://therealjohnnywatson.com/#johnny"
          }
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <form name="contact" method="POST" data-netlify="true" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="subject" />
      <textarea name="message"></textarea>
    </form>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", user => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });
      }
    </script>
  </body>
</html>
